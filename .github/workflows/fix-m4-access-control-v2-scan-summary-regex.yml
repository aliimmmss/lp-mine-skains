name: Fix M4 AccessControl audit v2 scan summary regex

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Replace unused scan destructuring
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('.github/scripts/audit-weth-access-control.mjs')
          content = path.read_text()
          pattern = r"scans:\s*scans\.map\(\(\{\s*events:\s*_events,\s*\.\.\.scan\s*\}\)\s*=>\s*scan\),"
          replacement = """scans: scans.map((scan) => ({
      label: scan.label,
      endpoint: scan.endpoint,
      status: scan.status,
      startBlock: scan.startBlock,
      endBlock: scan.endBlock,
      rawLogCount: scan.rawLogCount ?? null,
      eventCount: scan.eventCount ?? 0,
      eventDigest: scan.eventDigest ?? null,
      error: scan.error ?? null,
    })),"""
          updated, count = re.subn(pattern, replacement, content)
          if count != 1:
              raise SystemExit(f'expected one scan projection, replaced {count}')
          path.write_text(updated)
          PY
      - run: npm run format
      - run: npm run lint
      - name: Commit clean correction
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "fix: project AccessControl scan summaries explicitly"
          git push origin HEAD:agent/m4-access-control-history-audit-v2

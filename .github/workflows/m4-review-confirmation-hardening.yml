name: M4 Review Confirmation Hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require exact own-key sets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path('packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.ts')
          source = source_path.read_text()
          source = source.replace(
              "  return actualKeys.length === keys.length && keys.every((key) => key in record)",
              "  const expectedKeys = new Set(keys)\n  return actualKeys.length === expectedKeys.size && actualKeys.every((key) => expectedKeys.has(key))",
              1,
          )
          source_path.write_text(source)

          test_path = Path('packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.test.ts')
          test = test_path.read_text()
          marker = """  it('rejects extra secret, wallet, and transaction fields without preserving them', () => {
          """
          regression = """  it('rejects inherited expected fields combined with unsupported own fields', () => {
            const base = validConfirmation()
            const inherited = Object.create({ phrase: WETH_ALLOWANCE_REVOCATION_REVIEW_CONFIRMATION_PHRASE }) as Record<
              string,
              unknown
            >
            for (const [key, value] of Object.entries(base)) {
              if (key !== 'phrase') inherited[key] = value
            }
            inherited.providerPayload = { apiKey: 'prototype-bypass-secret' }

            const result = createWethAllowanceRevocationReviewConfirmation({
              intentResult: validIntentResult(),
              confirmation: inherited,
              assessedAt,
            })
            const serialized = JSON.stringify(result)

            expect(result.status).toBe('blocked')
            expect(result.reasonCodes).toContain('confirmation-schema')
            expect(serialized).not.toContain('prototype-bypass-secret')
            expect(result.executionEligible).toBe(false)
          })

          """
          if regression not in test:
              if marker not in test:
                  raise SystemExit('test insertion marker not found')
              test = test.replace(marker, regression + marker, 1)
          test_path.write_text(test)
          PY
          npx prettier --write \
            packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.ts \
            packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.test.ts
          npm run lint
          npm run typecheck
          npm test
      - name: Commit hardening changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.ts packages/robinhood-univ3/src/weth-allowance-revocation-review-confirmation.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Harden deliberate confirmation exact-key validation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Evidence Provenance Formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-and-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m2-evidence-provenance
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply formatter and remove workflow
        run: |
          npx prettier --write packages/core/src/position-costs.ts packages/core/src/position-costs.test.ts packages/core/src/index.ts apps/worker/src/position-fee-share-config.ts apps/worker/src/position-fee-share-config.test.ts apps/worker/src/position-performance.ts apps/worker/src/position-performance.test.ts
          rm .github/workflows/evidence-provenance-formatter.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "style: format evidence provenance changes"
          git push

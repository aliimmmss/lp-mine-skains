name: Restore M4 AccessControl audit script

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v3b

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v3b
          fetch-depth: 0
      - name: Restore reviewed audit script
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout 5aa8d2c9b2318919750df801068d97614c6b9603 -- \
            .github/scripts/audit-weth-access-control.mjs
          git add .github/scripts/audit-weth-access-control.mjs
          git commit -m "chore: restore reviewed AccessControl audit script"
          git push origin HEAD:agent/m4-access-control-history-audit-v3b

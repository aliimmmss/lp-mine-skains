name: Position Fee Share Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture diagnostics
        run: |
          npx prettier --write apps/worker/package.json apps/worker/src/position-fee-share-config.ts apps/worker/src/position-fee-share-config.test.ts apps/worker/src/position-fee-share.ts packages/core/src/index.ts packages/core/src/position-fee-share.ts packages/core/src/position-fee-share.test.ts
          git diff -- . ':!.github/workflows/position-fee-share-diagnostic.yml' > prettier.patch
          npm run lint > lint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: position-fee-share-diagnostics
          path: |
            prettier.patch
            lint.txt

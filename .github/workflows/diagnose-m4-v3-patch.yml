name: Diagnose M4 v3 patch assumptions

on:
  push:
    branches:
      - agent/m4-access-control-history-audit-v3b

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-access-control-history-audit-v3b
      - name: Record patch match counts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          content = Path('.github/scripts/audit-weth-access-control.mjs').read_text()
          checks = {
              'process_import': "import process from 'node:process'\n",
              'range_constant': 'const INITIAL_LOG_RANGE = 500_000n\n',
              'transport_start': 'async function rawLogs(rpc, fromBlock, toBlock) {',
              'adaptive_start': 'async function logsAdaptive(rpc, fromBlock, toBlock) {',
              'scan_setup': '  const rpc = rpcClient(url)\n  const raw = []\n  try {\n',
              'scan_call': 'raw.push(...(await logsAdaptive(rpc, from, to)))',
              'success_digest': '      eventDigest: digest(events),\n      events,\n',
              'failure_events': '      events: [],\n      error: safeError(error),\n',
              'agreement': '  scans[0].eventDigest === scans[1].eventDigest &&\n  JSON.stringify(scans[0].events) === JSON.stringify(scans[1].events)\n',
              'scan_projection': '    scans: scans.map(({ events: _events, ...scan }) => scan),',
          }
          report = '\n'.join(f'{name}={content.count(value)}' for name, value in checks.items()) + '\n'
          Path('.github/scripts/.m4-v3-patch-diagnostic').write_text(report)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/workflows/diagnose-m4-v3-patch.yml
          git add --all
          git commit -m "chore: capture v3 patch diagnostic"
          git push origin HEAD:agent/m4-access-control-history-audit-v3b

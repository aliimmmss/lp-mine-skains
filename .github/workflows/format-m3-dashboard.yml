name: Format M3 dashboard snapshot

on:
  push:
    branches:
      - feature/m3-dashboard-snapshot
    paths:
      - .github/workflows/format-m3-dashboard.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m3-dashboard-snapshot
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Commit formatting and remove workflow
        run: |
          rm .github/workflows/format-m3-dashboard.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/worker/src/monitor-health.ts apps/worker/src/monitor-health.test.ts docs/MONITORING.md .github/workflows/format-m3-dashboard.yml
          git commit -m "style(worker): format dashboard health snapshot"
          git push

name: Format M4 WETH control evidence

on:
  push:
    branches:
      - agent/m4-pin-weth-control-chain

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-pin-weth-control-chain
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Commit canonical formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "style: apply canonical formatting"
          git push origin HEAD:agent/m4-pin-weth-control-chain

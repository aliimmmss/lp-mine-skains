name: Worker History Test Formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-and-clean:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply formatter and remove workflow
        run: |
          npx prettier --write apps/worker/src/position-history.test.ts
          git rm .github/workflows/worker-history-test-formatter.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/worker/src/position-history.test.ts
          git commit -m "style: format worker history regression"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

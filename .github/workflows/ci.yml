name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run format
      - run: npx eslint . --fix || true
      - name: Commit safe style fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply automated style fixes"
          git push

  verify:
    needs: autofix
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - if: matrix.check == 'format'
        run: npm run format:check
      - if: matrix.check == 'lint'
        run: npm run lint
      - if: matrix.check == 'typecheck'
        run: npm run typecheck
      - if: matrix.check == 'test'
        run: npm test
      - if: matrix.check == 'build'
        run: npm run build

name: Temporary M3 dashboard formatter

on:
  push:
    branches:
      - agent/m3-local-monitor-dashboard

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m3-local-monitor-dashboard
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --write apps/worker/src/monitor-dashboard.ts apps/worker/src/monitor-dashboard.test.ts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/worker/src/monitor-dashboard.ts apps/worker/src/monitor-dashboard.test.ts
          if ! git diff --cached --quiet; then
            git commit -m "style(worker): format monitor dashboard"
            git push
          fi

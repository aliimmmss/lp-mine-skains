name: Position Costs Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture formatting patch
        run: |
          npx prettier --write packages/core/src/position-costs.ts packages/core/src/position-costs.test.ts apps/worker/src/position-fee-share-config.ts apps/worker/src/position-fee-share-config.test.ts apps/worker/src/position-performance.ts apps/worker/src/position-performance.test.ts
          git diff -- . ':!.github/workflows/position-costs-diagnostic.yml' > prettier.patch
      - uses: actions/upload-artifact@v4
        with:
          name: position-costs-diagnostics
          path: prettier.patch

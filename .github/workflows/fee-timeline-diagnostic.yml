name: Fee Timeline Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture formatting patch
        run: |
          npx prettier --write packages/core/src/position-fee-share.ts packages/core/src/position-fee-share.test.ts packages/core/src/index.ts apps/worker/src/position-history.ts
          git diff -- . ':!.github/workflows/fee-timeline-diagnostic.yml' > prettier.patch
      - uses: actions/upload-artifact@v4
        with:
          name: fee-timeline-diagnostics
          path: prettier.patch
